<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف مع حموووووود - الإصدار الموسوعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-deep: #020617;
            --accent-red: #ef4444;
            --gold: #fbbf24;
            --t1-color: #ffa500;
            --t2-color: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-deep); color: white; height: 100vh; overflow: hidden; }

        /* التصاميم العامة */
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(circle at 50% 50%, #111827 0%, #020617 100%); }
        .screen.active { display: flex; }

        .game-logo { font-family: 'Reem Kufi', sans-serif; font-size: 60px; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }

        .btn-main { background: linear-gradient(45deg, var(--accent-red), #991b1b); color: white; border: none; padding: 12px 30px; font-size: 20px; font-weight: 900; border-radius: 12px; cursor: pointer; transition: 0.3s; margin: 5px; }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* الموسوعة */
        #screen-questions { background: #0f172a; overflow-y: auto; padding: 50px; }
        .letter-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; width: 100%; max-width: 800px; }
        .letter-btn { background: var(--glass); border: 1px solid var(--gold); color: var(--gold); padding: 20px; font-size: 24px; border-radius: 10px; cursor: pointer; }
        .letter-btn:hover { background: var(--gold); color: black; }

        /* الخلية المتداخلة */
        .hex-grid { display: grid; grid-template-columns: repeat(5, 90px); gap: 10px; padding: 20px; margin-top: 20px; position: relative; }
        .hexagon { width: 90px; height: 104px; background: var(--accent-red); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        
        /* تأثير العفسة (الإزاحة) */
        .hex-grid div:nth-child(10n+6), .hex-grid div:nth-child(10n+7), .hex-grid div:nth-child(10n+8), .hex-grid div:nth-child(10n+9), .hex-grid div:nth-child(10n+10) {
            transform: translateX(45px);
        }

        .side-panel { width: 250px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .score-num { font-size: 60px; font-weight: 900; }
        .timer-display { font-size: 50px; font-weight: 900; font-family: monospace; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; border: 2px solid var(--gold); max-width: 600px; width: 100%; text-align: center; }
        
        .helper-btn { width: 100%; padding: 10px; margin-top: 5px; background: #1e293b; border: 1px solid #334155; color: white; cursor: pointer; border-radius: 5px; font-size: 14px; }
        .helper-btn.used { opacity: 0.3; pointer-events: none; text-decoration: line-through; }
    </style>
</head>
<body>

    <!-- شاشة البداية -->
    <section id="screen-start" class="screen active">
        <h1 class="game-logo">حروف مع حموووووود</h1>
        <button class="btn-main" onclick="goTo('screen-setup')">ابدأ اللعب</button>
        <button class="btn-main" style="background: var(--gold); color: black;" onclick="openEncyclopedia()">موسوعة الأسئلة</button>
    </section>

    <!-- شاشة الموسوعة -->
    <section id="screen-questions" class="screen">
        <button class="btn-main" style="position:fixed; top:20px; right:20px;" onclick="goTo('screen-start')">عودة ←</button>
        <h2 style="margin-bottom: 30px; color: var(--gold);">موسوعة الأسئلة (صعوبة عالية)</h2>
        <div class="letter-grid" id="encyclopedia-letters"></div>
    </section>

    <!-- شاشة الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="modal-content">
            <h2>إعدادات المواجهة</h2>
            <div style="display:flex; gap:20px; margin:20px 0;">
                <div style="flex:1">فريق 1: <input type="color" id="t1-color" value="#ffa500"></div>
                <div style="flex:1">فريق 2: <input type="color" id="t2-color" value="#00f2ff"></div>
            </div>
            <p>وقت السؤال:</p>
            <button class="btn-main" onclick="setT(30)">30 ث</button>
            <button class="btn-main" onclick="setT(45)">45 ث</button>
            <button class="btn-main" onclick="setT(60)">60 ث</button>
            <br><br>
            <button class="btn-main" style="width:100%" onclick="initGame()">دخول اللعبة</button>
        </div>
    </section>

    <!-- شاشة اللعبة -->
    <section id="screen-game" class="screen">
        <button onclick="location.reload()" style="position:fixed; top:10px; left:10px; color:red; background:none; border:none; cursor:pointer;">إنهاء اللعبة X</button>
        
        <div style="display:flex; width:100%; justify-content:space-around; align-items:center;">
            <!-- فريق 2 -->
            <div class="side-panel" style="border-top: 4px solid var(--t2-color);">
                <h2 id="name-t2">الفريق الثاني</h2>
                <div class="score-num" id="score-2">0</div>
                <button onclick="modScore(2, 1)">+</button> <button onclick="modScore(2, -1)">-</button>
                <div style="margin-top:20px;">
                    <button class="helper-btn" onclick="helpTime(this)">+ إضافة وقت</button>
                    <button class="helper-btn" onclick="helpHint(this)">؟ تلميح المقدم</button>
                </div>
            </div>

            <!-- المنتصف -->
            <div style="text-align:center">
                <div class="timer-display" id="timer-box">00:45</div>
                <button class="btn-main" id="timer-ctrl" onclick="toggleTimer()">تشغيل</button>
                <div class="hex-grid" id="game-grid"></div>
            </div>

            <!-- فريق 1 -->
            <div class="side-panel" style="border-top: 4px solid var(--t1-color);">
                <h2 id="name-t1">الفريق الأول</h2>
                <div class="score-num" id="score-1">0</div>
                <button onclick="modScore(1, 1)">+</button> <button onclick="modScore(1, -1)">-</button>
                <div style="margin-top:20px;">
                    <button class="helper-btn" onclick="helpTime(this)">+ إضافة وقت</button>
                    <button class="helper-btn" onclick="helpHint(this)">؟ تلميح المقدم</button>
                </div>
            </div>
        </div>
    </section>

    <!-- مودال استعراض أسئلة الحرف -->
    <div id="modal-ency" class="modal">
        <div class="modal-content" style="max-height:80vh; overflow-y:auto;">
            <h1 id="ency-letter" style="color:var(--gold); font-size:50px;">أ</h1>
            <button class="btn-main" onclick="pickRandomEnc()">سؤال عشوائي لهذا الحرف</button>
            <hr style="margin:20px 0; opacity:0.2;">
            <div id="ency-list" style="text-align:right; line-height:1.8;"></div>
            <button class="btn-main" style="background:gray" onclick="closeM('modal-ency')">إغلاق</button>
        </div>
    </div>

    <!-- مودال اللعب (سؤال الحرف) -->
    <div id="modal-play" class="modal">
        <div class="modal-content">
            <h1 id="play-letter" style="font-size:80px; color:var(--gold);">؟</h1>
            <p id="play-q" style="font-size:22px; margin:20px 0; font-weight:bold;"></p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button id="p-btn-2" class="btn-main" onclick="winHex(2)">فريق 2</button>
                <button id="p-btn-1" class="btn-main" onclick="winHex(1)">فريق 1</button>
            </div>
            <button onclick="closeM('modal-play')" style="margin-top:20px; color:gray; background:none; border:none; cursor:pointer;">تخطي</button>
        </div>
    </div>

    <script>
        // بنك الأسئلة (نموذج مكثف وصعب وغير ديني)
        const qBank = {
            "أ": ["أبعد كوكب عن الشمس في نظامنا الشمسي؟ (نبتون - يبدأ بـ 'أ' في 'أبعد')", "أصغر دولة في العالم من حيث المساحة؟ (الفاتيكان)", "أول عنصر في الجدول الدوري؟ (الهيدروجين)", "أديب روسي صاحب رواية الجريمة والعقاب؟ (دوستويفسكي)", "أكبر عضلة في جسم الإنسان؟ (عضلة الفخذ)", "أول من حصل على جائزة نوبل في الفيزياء؟ (رونتجن)", "أعمق نقطة في المحيطات تسمى خندق...؟ (ماريانا)", "أعلى شلالات في العالم تقع في فنزويلا؟ (أنجل)", "أول لغة برمجة عالية المستوى؟ (فورتران)", "أصغر عظمة في جسم الإنسان؟ (الركاب)"],
            "ب": ["بحر يحد أوزبكستان وكازاخستان وجف معظمه؟ (آرال)", "بروتين في خلايا الدم الحمراء يحمل الأكسجين؟ (هيموجلوبين)", "بعثة علمية قادها داروين؟ (بيجل)", "بلد الـ 1000 بحيرة؟ (فنلندا)", "بوابة مشتعلة بالغاز في تركمانستان تسمى بوابة...؟ (جهنم)", "بركان دمر مدينة بومبي الرومانية؟ (فيزوف)", "بحر لا يوجد له شواطئ برية؟ (سارجاسو)", "بطل رواية 'البؤساء' لفيكتور هوجو؟ (جان فالجان)", "بحر يفصل بين بريطانيا وفرنسا؟ (المانش)", "بناء تاريخي في الهند بناه شاه جيهان؟ (تاج محل)"],
            "ت": ["تمثال يمثل الحكمة والجمال في اليونان القديمة؟ (أثينا)", "تحول المادة من الحالة الصلبة إلى الغازية مباشرة؟ (تسامي)", "تاريخ سقوط جدار برلين؟ (1989)", "ثاني أطول نهر في العالم؟ (الأمازون - يبدأ بـ 'ت' في 'ثاني')", "تعدين العملات الرقمية يسمى بـ...؟ (ماينينج)", "ثقب أسود يقع في مركز مجرتنا؟ (ساجيتاريوس أ)", "تمثال الحرية كان هدية من أي دولة؟ (فرنسا)", "تقنية الاتصال اللاسلكي لمسافات قصيرة؟ (بلوتوث)", "تجمع سكاني هو الأعلى كثافة في العالم؟ (ماكاو)", "تخصص علمي يدرس الزلازل؟ (سيزمولوجيا)"]
            // ... يمكنك إكمال الحروف (ج، ح، خ...) بنفس النمط
        };

        const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split('');
        let cfg = { t: 45, left: 45, on: false, s1:0, s2:0 };
        let curH = null;
        let timer;

        function goTo(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function setT(v) { cfg.t = v; cfg.left = v; updateT(); }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        // تهيئة الموسوعة
        function openEncyclopedia() {
            const container = document.getElementById('encyclopedia-letters');
            container.innerHTML = '';
            letters.forEach(l => {
                const b = document.createElement('button');
                b.className = 'letter-btn';
                b.innerText = l;
                b.onclick = () => showEnc(l);
                container.appendChild(b);
            });
            goTo('screen-questions');
        }

        function showEnc(l) {
            document.getElementById('ency-letter').innerText = l;
            const list = document.getElementById('ency-list');
            list.innerHTML = (qBank[l] || ["قريباً.."]).map((q, i) => `<p>${i+1}. ${q}</p>`).join('');
            document.getElementById('modal-ency').style.display='flex';
        }

        function pickRandomEnc() {
            const l = document.getElementById('ency-letter').innerText;
            const qs = qBank[l] || [];
            if(qs.length) alert("سؤال عشوائي: " + qs[Math.floor(Math.random()*qs.length)]);
        }

        // تهيئة اللعبة
        function initGame() {
            const c1 = document.getElementById('t1-color').value;
            const c2 = document.getElementById('t2-color').value;
            document.getElementById('name-t1').style.color = c1;
            document.getElementById('name-t2').style.color = c2;
            document.getElementById('p-btn-1').style.background = c1;
            document.getElementById('p-btn-2').style.background = c2;
            
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const shuffled = [...letters].sort(()=>Math.random()-0.5);
            shuffled.forEach((l, i) => {
                const h = document.createElement('div');
                h.className = 'hexagon';
                h.id = 'hex-'+i;
                h.innerText = l;
                h.onclick = () => openPlay(l, i);
                grid.appendChild(h);
            });
            goTo('screen-game');
        }

        function openPlay(l, i) {
            curH = i;
            document.getElementById('play-letter').innerText = l;
            const qs = qBank[l] || ["سؤال افتراضي صلب؟"];
            document.getElementById('play-q').innerText = qs[Math.floor(Math.random()*qs.length)];
            document.getElementById('modal-play').style.display='flex';
        }

        function winHex(team) {
            const color = team==1 ? document.getElementById('t1-color').value : document.getElementById('t2-color').value;
            document.getElementById('hex-'+curH).style.background = color;
            closeM('modal-play');
        }

        function modScore(t, v) {
            cfg['s'+t] += v;
            document.getElementById('score-'+t).innerText = cfg['s'+t];
        }

        function toggleTimer() {
            const b = document.getElementById('timer-ctrl');
            if(cfg.on) { clearInterval(timer); cfg.on=false; b.innerText="تشغيل"; }
            else {
                cfg.on=true; b.innerText="إيقاف";
                timer = setInterval(() => {
                    cfg.left--; updateT();
                    if(cfg.left <= 0) { clearInterval(timer); alert("انتهى الوقت!"); resetT(); }
                }, 1000);
            }
        }
        function resetT() { clearInterval(timer); cfg.left = cfg.t; updateT(); document.getElementById('timer-ctrl').innerText="تشغيل"; cfg.on=false; }
        function updateT() { document.getElementById('timer-box').innerText = `00:${cfg.left.toString().padStart(2,'0')}`; }

        // تفعيل وسائل المساعدة
        function helpTime(btn) {
            cfg.left += 60; // إضافة دقيقة
            updateT();
            btn.classList.add('used');
            btn.innerText = "تمت الإضافة ✅";
        }

        function helpHint(btn) {
            alert("تلميح للمقدم: الإجابة تحتوي على معلومة تاريخية/علمية هامة.");
            btn.classList.add('used');
        }
    </script>
</body>
</html>
