<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف مع حموووووود Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- مكتبة الاحتفالات -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-deep: #020617;
            --accent-red: #ef4444;
            --gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --t1-color: #ffa500;
            --t2-color: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: var(--bg-deep);
            color: white;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        /* الشاشات */
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .screen.active { display: flex; animation: zoomIn 0.5s ease; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        /* التصميم الفخم */
        .luxury-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .main-title {
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
            text-align: center;
            color: white; /* اللون الافتراضي للنص الأبيض */
        }
        .main-title .highlight {
            display: block; /* "مع حموووووود" ستبدأ في سطر جديد */
            font-size: 0.7em; /* حجم أصغر نسبياً */
            color: var(--gold); /* لون ذهبي مميز */
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.7); /* توهج ذهبي */
            margin-top: 10px; /* مسافة من السطر العلوي */
            line-height: 1.2;
        }

        .btn-play {
            background: white; color: black; border: none; padding: 15px 50px;
            font-size: 24px; font-weight: 900; border-radius: 50px; cursor: pointer;
            transition: 0.3s; margin-top: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .btn-play:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,255,255,0.4); }

        /* الخلية الشبكية */
        .game-container { display: flex; width: 100%; height: 100%; padding: 20px; justify-content: space-around; align-items: center; }
        
        .side-panel { width: 300px; padding: 20px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); }
        
        .hex-grid {
            display: grid;
            grid-template-columns: repeat(5, 85px);
            gap: 12px;
            padding: 40px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        .hexagon {
            width: 85px; height: 98px;
            background: var(--accent-red);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 900; cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .hexagon:hover { transform: scale(1.15); z-index: 10; filter: brightness(1.2); }
        .hexagon.owned { cursor: default; }
        .hexagon.winner-path { animation: glow 1s infinite alternate; border: 2px solid white; }

        @keyframes glow { from { filter: brightness(1); box-shadow: 0 0 10px white; } to { filter: brightness(1.8); box-shadow: 0 0 30px white; } }

        /* المؤقت والتحكم */
        .timer-box { font-size: 60px; font-family: 'Courier New', monospace; font-weight: 900; color: white; margin-bottom: 10px; }
        .control-btns { display: flex; gap: 10px; }
        .btn-small { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-small:hover { background: rgba(255,255,255,0.1); }

        /* البطاقات العشوائية */
        .power-up-icon { position: absolute; font-size: 20px; top: 10px; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: #111; padding: 50px; border-radius: 40px; text-align: center; border: 2px solid var(--gold); }
        
        .score-val { font-size: 70px; font-weight: 900; line-height: 1; }
    </style>
</head>
<body>

    <!-- شاشة البداية -->
    <section id="screen-start" class="screen active">
        <div class="luxury-card">
            <h1 class="main-title">حروف <br><span class="highlight">مع حموووووود</span></h1>
            <p style="color: var(--accent-red); font-weight: bold; margin-bottom: 20px;">النسخة الاحترافية</p>
            <div style="text-align: right; margin: 20px 0; font-size: 18px; opacity: 0.8;">
                <p>✔ نظام كشف المسار الآلي</p>
                <p>✔ بطاقات طاقة عشوائية</p>
                <p>✔ مؤثرات سينمائية</p>
            </div>
            <button class="btn-play" onclick="goTo('screen-setup')">تحديد الفرق</button>
        </div>
    </section>

    <!-- شاشة الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="luxury-card">
            <h2>إعدادات المعركة</h2>
            <div style="display: flex; gap: 30px; margin: 30px 0;">
                <div class="side-panel">
                    <h3>الفريق الأول</h3>
                    <input type="color" id="t1-color" value="#ffa500" style="width:100%; height:50px; margin-top:10px;">
                </div>
                <div class="side-panel">
                    <h3>الفريق الثاني</h3>
                    <input type="color" id="t2-color" value="#00f2ff" style="width:100%; height:50px; margin-top:10px;">
                </div>
            </div>
            <h3>مدة السؤال</h3>
            <div style="display:flex; gap:10px; justify-content:center; margin:20px 0;">
                <button class="btn-small time-opt" onclick="setInitialTime(30, this)">30 ث</button>
                <button class="btn-small time-opt active" onclick="setInitialTime(45, this)" style="background:var(--accent-red)">45 ث</button>
                <button class="btn-small time-opt" onclick="setInitialTime(60, this)">1 د</button>
            </div>
            <button class="btn-play" onclick="startGame()">ابدأ التحدي</button>
        </div>
    </section>

    <!-- شاشة اللعبة -->
    <section id="screen-game" class="screen">
        <div class="game-container">
            <!-- فريق 2 -->
            <div class="side-panel" id="panel-t2">
                <h2 id="name-t2" style="font-size: 28px;">الفريق الثاني</h2>
                <div class="score-val" id="score-t2">0</div>
                <p>الجولات: <span id="round-t2">0</span>/3</p>
                <div style="margin: 15px 0;">
                    <button class="btn-small" onclick="adjustScore(2, 1)">+</button>
                    <button class="btn-small" onclick="adjustScore(2, -1)">-</button>
                </div>
                <div id="helpers-t2">
                    <p style="font-size:12px; margin-bottom:5px;">وسائل المساعدة</p>
                    <button class="btn-small" onclick="useHelper(this)" style="width:100%; margin-bottom:5px;">إضافة دقيقة</button>
                    <button class="btn-small" onclick="useHelper(this)" style="width:100%; margin-bottom:5px;">مساعدة المقدم</button>
                    <button class="btn-small" onclick="useHelper(this)" style="width:100%;">هاتف</button>
                </div>
            </div>

            <!-- المنتصف -->
            <div style="text-align: center;">
                <div class="timer-box" id="timer">00:45</div>
                <div class="control-btns" style="justify-content: center; margin-bottom: 20px;">
                    <button class="btn-small" id="btn-timer-toggle" onclick="toggleTimer()" style="background: white; color: black;">تشغيل المؤقت</button>
                    <button class="btn-small" onclick="resetGameTimer()">إعادة تعيين</button>
                    <button class="btn-small btn-end-game" onclick="location.reload()" style="background: var(--accent-red);">إنهاء اللعبة</button>
                </div>
                <div class="hex-grid" id="grid"></div>
                <button class="btn-small" onclick="generateGrid()" style="margin-top: 20px;">تبديل الحروف عشوائياً</button>
            </div>

            <!-- فريق 1 -->
            <div class="side-panel" id="panel-t1">
                <h2 id="name-t1" style="font-size: 28px;">الفريق الأول</h2>
                <div class="score-val" id="score-t1">0</div>
                <p>الجولات: <span id="round-t1">0</span>/3</p>
                <div style="margin: 15px 0;">
                    <button class="btn-small" onclick="adjustScore(1, 1)">+</button>
                    <button class="btn-small" onclick="adjustScore(1, -1)">-</button>
                </div>
                <div id="helpers-t1">
                    <p style="font-size:12px; margin-bottom:5px;">وسائل المساعدة</p>
                    <button class="btn-small" onclick="useHelper(this)" style="width:100%; margin-bottom:5px;">إضافة دقيقة</button>
                    <button class="btn-small" onclick="useHelper(this)" style="width:100%; margin-bottom:5px;">مساعدة المقدم</button>
                    <button class="btn-small" onclick="useHelper(this)" style="width:100%;">هاتف</button>
                </div>
            </div>
        </div>
    </section>

    <!-- نافذة الاختيار -->
    <div id="modal-choice" class="modal">
        <div class="modal-content">
            <h1 id="selected-letter" style="font-size: 80px; color: var(--gold);">أ</h1>
            <div id="power-up-msg" style="color: #4ade80; margin-bottom: 20px; font-weight: bold;"></div>
            <h3>من الفائز بهذا الحرف؟</h3>
            <div style="display: flex; gap: 20px; margin-top: 30px;">
                <button id="btn-choice-t2" onclick="assignHex(2)" style="padding: 20px 40px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer;">الفريق الثاني</button>
                <button id="btn-choice-t1" onclick="assignHex(1)" style="padding: 20px 40px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer;">الفريق الأول</button>
            </div>
            <button onclick="closeModal()" style="margin-top: 30px; background: none; border: none; color: gray; cursor: pointer;">إلغاء</button>
        </div>
    </div>

    <script>
        // --- إدارة الصوت ---
        const sounds = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            tick: new Audio('https://assets.mixkit.co/active_storage/sfx/2544/2544-preview.mp3'),
            victory: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            timeout: new Audio('https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3'),
            powerup: new Audio('https://assets.mixkit.co/active_storage/sfx/1432/1432-preview.mp3')
        };

        let gameSettings = {
            t1Color: '#ffa500',
            t2Color: '#00f2ff',
            initialTime: 45, // تم تعديل الوقت الافتراضي
            timeLeft: 45,    // تم تعديل الوقت الافتراضي
            timerActive: false,
            scores: { 1: 0, 2: 0 },
            rounds: { 1: 0, 2: 0 }
        };

        let currentHexIdx = null;
        let gridData = []; // لتخزين معلومات الخلايا

        function goTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setInitialTime(sec, btn) {
            gameSettings.initialTime = sec;
            gameSettings.timeLeft = sec;
            document.querySelectorAll('.time-opt').forEach(b => b.style.background = 'var(--glass)');
            btn.style.background = 'var(--accent-red)';
            updateTimerDisplay();
        }

        function startGame() {
            gameSettings.t1Color = document.getElementById('t1-color').value;
            gameSettings.t2Color = document.getElementById('t2-color').value;
            
            // تطبيق الألوان على الواجهة
            document.getElementById('name-t1').style.color = gameSettings.t1Color;
            document.getElementById('panel-t1').style.borderColor = gameSettings.t1Color;
            document.getElementById('btn-choice-t1').style.background = gameSettings.t1Color;

            document.getElementById('name-t2').style.color = gameSettings.t2Color;
            document.getElementById('panel-t2').style.borderColor = gameSettings.t2Color;
            document.getElementById('btn-choice-t2').style.background = gameSettings.t2Color;

            generateGrid();
            goTo('screen-game');
        }

        // --- نظام الخلايا والبطاقات ---
        function generateGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            gridData = [];
            const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split('').sort(() => Math.random() - 0.5);

            for (let i = 0; i < 25; i++) {
                let powerUp = null;
                const rand = Math.random();
                if (rand < 0.05) powerUp = 'gold'; // 5% فرصة نقطة ذهبية
                else if (rand < 0.1) powerUp = 'bomb'; // 5% فرصة قنبلة

                gridData.push({ id: i, owner: null, powerUp: powerUp, letter: letters[i] });

                const hex = document.createElement('div');
                hex.className = 'hexagon';
                hex.id = `hex-${i}`;
                hex.innerText = letters[i];
                hex.onclick = () => handleHexClick(i);
                grid.appendChild(hex);
            }
        }

        function handleHexClick(idx) {
            if (gridData[idx].owner) return;
            sounds.click.play();
            currentHexIdx = idx;
            document.getElementById('selected-letter').innerText = gridData[idx].letter;
            
            const msg = document.getElementById('power-up-msg');
            msg.innerText = "";
            if(gridData[idx].powerUp === 'gold') msg.innerText = "⚡ بطاقة ذهبية: الفريق الفائز يحصل على نقطتين!";
            if(gridData[idx].powerUp === 'bomb') msg.innerText = "💣 فخ: الفريق الخاسر يخصم منه نقطة!";

            document.getElementById('modal-choice').style.display = 'flex';
        }

        function assignHex(team) {
            const hexObj = gridData[currentHexIdx];
            hexObj.owner = team;
            const hexEl = document.getElementById(`hex-${currentHexIdx}`);
            hexEl.style.background = (team === 1) ? gameSettings.t1Color : gameSettings.t2Color;
            hexEl.classList.add('owned');

            // منطق البطاقات
            if(hexObj.powerUp === 'gold') {
                sounds.powerup.play();
                adjustScore(team, 2);
            } else {
                adjustScore(team, 1);
            }
            
            if(hexObj.powerUp === 'bomb') {
                sounds.timeout.play();
                adjustScore(team === 1 ? 2 : 1, -1);
            }

            closeModal();
            checkVictoryPath(team);
        }

        // --- نظام المسار الذكي (BFS Algorithm) ---
        function checkVictoryPath(team) {
            const size = 5;
            let startNodes = [];
            let targetNodes = [];

            if (team === 1) { // من الأعلى (0-4) للأسفل (20-24)
                for(let i=0; i<5; i++) if(gridData[i].owner === 1) startNodes.push(i);
                for(let i=20; i<25; i++) if(gridData[i].owner === 1) targetNodes.push(i);
            } else { // من اليمين لليسار
                for(let i=0; i<25; i+=5) if(gridData[i].owner === 2) startNodes.push(i);
                for(let i=4; i<25; i+=5) if(gridData[i].owner === 2) targetNodes.push(i);
            }

            for(let start of startNodes) {
                let visited = new Set();
                let queue = [[start]];
                while(queue.length > 0) {
                    let path = queue.shift();
                    let node = path[path.length - 1];
                    if(targetNodes.includes(node)) {
                        triggerWin(team, path);
                        return;
                    }
                    if(!visited.has(node)) {
                        visited.add(node);
                        getNeighbors(node).forEach(neighbor => {
                            if(gridData[neighbor].owner === team) {
                                queue.push([...path, neighbor]);
                            }
                        });
                    }
                }
            }
        }

        function getNeighbors(idx) {
            const row = Math.floor(idx / 5);
            const col = idx % 5;
            let neighbors = [];
            // اتجاهات الجيران في شبكة سداسية
            const potential = [
                [row, col-1], [row, col+1], // يسار يمين
                [row-1, col], [row+1, col] // أعلى أسفل (في نفس العمود)
            ];
            // الجيران المائلون يعتمدون على الزوجي والفردي للصف
            if (row % 2 === 0) { // صف زوجي
                potential.push([row-1, col-1]); // أعلى يسار
                potential.push([row+1, col-1]); // أسفل يسار
            } else { // صف فردي
                potential.push([row-1, col+1]); // أعلى يمين
                potential.push([row+1, col+1]); // أسفل يمين
            }

            potential.forEach(([r, c]) => {
                if(r >=0 && r < 5 && c >= 0 && c < 5) neighbors.push(r * 5 + c);
            });
            return neighbors;
        }

        function triggerWin(team, path) {
            sounds.victory.play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            path.forEach(idx => document.getElementById(`hex-${idx}`).classList.add('winner-path'));

            setTimeout(() => {
                gameSettings.rounds[team]++;
                document.getElementById(`round-${team}`).innerText = gameSettings.rounds[team];
                if(gameSettings.rounds[team] >= 3) {
                    alert(`🏆 مبروك! الفريق ${team === 1 ? 'الأول' : 'الثاني'} فاز باللعبة كاملة!`);
                    location.reload();
                } else {
                    alert(`فاز الفريق ${team} بهذه الجولة!`);
                    generateGrid();
                }
            }, 2000);
        }

        // --- نظام المؤقت المطور ---
        let timerInterval;
        function toggleTimer() {
            const btn = document.getElementById('btn-timer-toggle');
            if(gameSettings.timerActive) {
                clearInterval(timerInterval);
                gameSettings.timerActive = false;
                btn.innerText = "استئناف";
                btn.style.background = "white";
            } else {
                gameSettings.timerActive = true;
                btn.innerText = "إيقاف مؤقت";
                btn.style.background = "var(--accent-red)";
                timerInterval = setInterval(() => {
                    gameSettings.timeLeft--;
                    updateTimerDisplay();
                    
                    // صوت التكتكة
                    if(gameSettings.timeLeft > 0 && gameSettings.timeLeft <= 10) {
                        sounds.tick.playbackRate = 2.0; // تسريع الصوت آخر 10 ثواني
                        sounds.tick.play();
                    } else if (gameSettings.timeLeft > 10) {
                        sounds.tick.playbackRate = 1.0;
                        sounds.tick.play();
                    }

                    if(gameSettings.timeLeft <= 0) {
                        clearInterval(timerInterval);
                        sounds.timeout.play();
                        alert("انتهى الوقت!");
                        resetGameTimer();
                    }
                }, 1000);
            }
        }

        function resetGameTimer() {
            clearInterval(timerInterval);
            gameSettings.timerActive = false;
            gameSettings.timeLeft = gameSettings.initialTime;
            document.getElementById('btn-timer-toggle').innerText = "تشغيل المؤقت";
            document.getElementById('btn-timer-toggle').style.background = "white";
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            let m = Math.floor(gameSettings.timeLeft / 60);
            let s = gameSettings.timeLeft % 60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function adjustScore(team, val) {
            gameSettings.scores[team] += val;
            if(gameSettings.scores[team] < 0) gameSettings.scores[team] = 0;
            document.getElementById(`score-${team}`).innerText = gameSettings.scores[team];
        }

        function useHelper(btn) {
            btn.style.opacity = "0.2";
            btn.onclick = null;
            btn.innerText = "❌ مستخدم";
            sounds.powerup.play();
        }

        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }
    </script>
</body>
</html>
