<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف مع حموووووود - PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-deep: #020617;
            --accent-red: #ef4444;
            --gold: #fbbf24;
            --t1-color: #ffa500;
            --t2-color: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: var(--bg-deep);
            color: white;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #020617 100%);
        }

        /* الاسم الجديد بتصميم فخم */
        .game-logo {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 60px;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 50%, #b45309 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.4));
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .screen.active { display: flex; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-main {
            background: linear-gradient(45deg, var(--accent-red), #991b1b);
            color: white; border: none; padding: 15px 40px;
            font-size: 24px; font-weight: 900; border-radius: 15px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* تعديل الخلية لتكون متداخلة (Honeycomb Style) */
        .hex-grid {
            display: grid;
            grid-template-columns: repeat(5, 90px);
            gap: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .hexagon {
            width: 90px; height: 104px;
            background: var(--accent-red);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: 900; cursor: pointer; transition: 0.3s;
            position: relative;
        }

        /* إزاحة السطر الثاني والرابع لخلق مظهر العفسة/الخلية */
        .hex-grid div:nth-child(10n+6), 
        .hex-grid div:nth-child(10n+7), 
        .hex-grid div:nth-child(10n+8), 
        .hex-grid div:nth-child(10n+9), 
        .hex-grid div:nth-child(10n+10) {
            transform: translateX(50px);
        }

        .hexagon:hover { transform: scale(1.1) !important; z-index: 10; }
        .hexagon.winner-path { animation: winGlow 0.8s infinite alternate; }
        @keyframes winGlow { from { filter: brightness(1); } to { filter: brightness(2); transform: scale(1.1); } }

        /* لوحات الفرق */
        .side-panel {
            width: 260px; padding: 25px; border-radius: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; backdrop-filter: blur(10px);
        }
        .score-num { font-size: 80px; font-weight: 900; margin: 10px 0; line-height: 1; color: white; }
        
        .btn-circle {
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid white;
            background: none; color: white; font-size: 20px; cursor: pointer; margin: 0 5px;
        }
        .btn-circle:hover { background: white; color: black; }

        .timer-display { font-size: 65px; font-weight: 900; font-family: monospace; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.3); }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <!-- شاشة البداية -->
    <section id="screen-start" class="screen active">
        <h1 class="game-logo">حروف مع حموووووود</h1>
        <button class="btn-main" onclick="goTo('screen-setup')">تحديد الفرق والوقت</button>
    </section>

    <!-- شاشة الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="side-panel" style="width: 500px;">
            <h2 style="margin-bottom: 20px;">إعدادات اللعبة</h2>
            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div style="flex:1">
                    <p>لون الفريق الأول</p>
                    <input type="color" id="t1-color" value="#ffa500" style="width:100%; height:40px;">
                </div>
                <div style="flex:1">
                    <p>لون الفريق الثاني</p>
                    <input type="color" id="t2-color" value="#00f2ff" style="width:100%; height:40px;">
                </div>
            </div>

            <p style="margin-bottom: 10px;">حدد وقت السؤال</p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 30px;">
                <button class="btn-main" style="font-size:16px; padding:10px" onclick="setTimerVal(30, this)">30 ثانية</button>
                <button class="btn-main" style="font-size:16px; padding:10px; background:gray" id="default-time" onclick="setTimerVal(45, this)">45 ثانية</button>
                <button class="btn-main" style="font-size:16px; padding:10px; background:gray" onclick="setTimerVal(60, this)">1 دقيقة</button>
            </div>

            <button class="btn-main" style="width: 100%;" onclick="startNewGame()">ابدأ اللعب</button>
        </div>
    </section>

    <!-- شاشة اللعبة -->
    <section id="screen-game" class="screen">
        <!-- زر إنهاء اللعبة -->
        <button onclick="endGame()" style="position:fixed; top:20px; left:20px; background:rgba(255,0,0,0.3); border:1px solid red; color:white; padding:10px; cursor:pointer; border-radius:10px;">إنهاء اللعبة X</button>

        <div style="display: flex; width: 100%; justify-content: space-around; align-items: center;">
            <!-- الفريق 2 -->
            <div class="side-panel" style="border-top: 5px solid var(--t2-color);">
                <h2 id="name-t2" style="color:var(--t2-color)">الفريق الثاني</h2>
                <div class="score-num" id="score-val-2">0</div>
                <div style="margin-bottom: 15px;">
                    <button class="btn-circle" onclick="changeScore(2, 1)">+</button>
                    <button class="btn-circle" onclick="changeScore(2, -1)">-</button>
                </div>
                <p>الجولات: <span id="round-2">0</span>/3</p>
            </div>

            <!-- المنتصف -->
            <div style="text-align: center;">
                <h2 class="game-logo" style="font-size: 30px;">حروف مع حموووووود</h2>
                <div class="timer-display" id="timer-box">00:45</div>
                <div style="margin: 10px 0;">
                    <button class="btn-main" id="timer-btn" style="font-size:18px; padding:8px 20px;" onclick="toggleTimer()">تشغيل</button>
                    <button class="btn-main" style="font-size:18px; padding:8px 20px; background:gray;" onclick="resetTimer()">إعادة</button>
                </div>
                <div class="hex-grid" id="grid-container"></div>
                <button class="btn-main" style="font-size:14px; margin-top:15px; background:#334155" onclick="createGrid()">تبديل عشوائي</button>
            </div>

            <!-- الفريق 1 -->
            <div class="side-panel" style="border-top: 5px solid var(--t1-color);">
                <h2 id="name-t1" style="color:var(--t1-color)">الفريق الأول</h2>
                <div class="score-num" id="score-val-1">0</div>
                <div style="margin-bottom: 15px;">
                    <button class="btn-circle" onclick="changeScore(1, 1)">+</button>
                    <button class="btn-circle" onclick="changeScore(1, -1)">-</button>
                </div>
                <p>الجولات: <span id="round-1">0</span>/3</p>
            </div>
        </div>
    </section>

    <!-- نافذة الاختيار -->
    <div id="choice-modal" class="modal">
        <div style="background:#111; padding:40px; border-radius:25px; text-align:center; border:2px solid var(--gold);">
            <h1 id="modal-char" style="font-size:100px; color:var(--gold);">؟</h1>
            <p>من الفريق الذي أجاب بشكل صحيح؟</p>
            <div style="display:flex; gap:20px; margin-top:30px;">
                <button id="modal-btn-2" style="padding:15px 30px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;" onclick="setWinner(2)">الفريق الثاني</button>
                <button id="modal-btn-1" style="padding:15px 30px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;" onclick="setWinner(1)">الفريق الأول</button>
            </div>
            <button onclick="document.getElementById('choice-modal').style.display='none'" style="margin-top:20px; background:none; color:gray; border:none; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script>
        // الأصوات
        const sounds = {
            tick: new Audio('https://assets.mixkit.co/active_storage/sfx/2544/2544-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            pop: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3')
        };

        let config = {
            t1Color: '#ffa500', t2Color: '#00f2ff',
            timeSet: 45, timeLeft: 45, timerOn: false,
            scores: { 1: 0, 2: 0 }, rounds: { 1: 0, 2: 0 }
        };

        let currentHex = null;
        let hexData = [];
        let timerInt;

        function goTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setTimerVal(val, btn) {
            config.timeSet = val;
            config.timeLeft = val;
            document.querySelectorAll('#screen-setup .btn-main').forEach(b => b.style.background = 'gray');
            btn.style.background = 'var(--accent-red)';
            updateTimerUI();
        }

        function startNewGame() {
            config.t1Color = document.getElementById('t1-color').value;
            config.t2Color = document.getElementById('t2-color').value;
            
            // تحديث الألوان في الواجهة
            document.getElementById('name-t1').style.color = config.t1Color;
            document.getElementById('name-t2').style.color = config.t2Color;
            document.getElementById('modal-btn-1').style.background = config.t1Color;
            document.getElementById('modal-btn-2').style.background = config.t2Color;

            createGrid();
            goTo('screen-game');
        }

        function createGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            hexData = [];
            const chars = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split('').sort(() => Math.random() - 0.5);

            for (let i = 0; i < 25; i++) {
                hexData.push({ owner: null, char: chars[i] });
                const hex = document.createElement('div');
                hex.className = 'hexagon';
                hex.id = `hex-${i}`;
                hex.innerText = chars[i];
                hex.onclick = () => {
                    sounds.pop.play();
                    currentHex = i;
                    document.getElementById('modal-char').innerText = chars[i];
                    document.getElementById('choice-modal').style.display = 'flex';
                };
                container.appendChild(hex);
            }
        }

        function setWinner(team) {
            hexData[currentHex].owner = team;
            const el = document.getElementById(`hex-${currentHex}`);
            el.style.background = (team === 1) ? config.t1Color : config.t2Color;
            document.getElementById('choice-modal').style.display = 'none';
            checkAutoWin(team);
        }

        // إصلاح زيادة النقاط
        function changeScore(team, val) {
            config.scores[team] += val;
            if (config.scores[team] < 0) config.scores[team] = 0;
            document.getElementById(`score-val-${team}`).innerText = config.scores[team];
        }

        // المؤقت
        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if (config.timerOn) {
                clearInterval(timerInt);
                config.timerOn = false;
                btn.innerText = "استئناف";
            } else {
                config.timerOn = true;
                btn.innerText = "إيقاف";
                timerInt = setInterval(() => {
                    config.timeLeft--;
                    updateTimerUI();
                    if(config.timeLeft <= 10) sounds.tick.play();
                    if(config.timeLeft <= 0) {
                        clearInterval(timerInt);
                        alert("انتهى الوقت!");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInt);
            config.timerOn = false;
            config.timeLeft = config.timeSet;
            document.getElementById('timer-btn').innerText = "تشغيل";
            updateTimerUI();
        }

        function updateTimerUI() {
            let s = config.timeLeft;
            document.getElementById('timer-box').innerText = `00:${s.toString().padStart(2, '0')}`;
        }

        function endGame() {
            if(confirm("هل تريد إنهاء اللعبة والعودة للبداية؟")) {
                location.reload(); // أسهل طريقة لإعادة كل شيء للصفر
            }
        }

        // نظام التحقق من الفوز (مبسط)
        function checkAutoWin(team) {
            const owned = hexData.filter(h => h.owner === team).length;
            if(owned >= 8) { // إذا جمع الفريق 8 حروف (يمكنك جعلها يدوية للمقدم)
                 // سنترك للمقدم حرية إنهاء الجولة أو تفعيل القصاصات يدوياً
            }
            // لتفعيل القصاصات عند فوز جولة:
            // winEffect(team);
        }

        function winEffect(team) {
            sounds.win.play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            config.rounds[team]++;
            document.getElementById(`round-${team}`).innerText = config.rounds[team];
        }
    </script>
</body>
</html>
