<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف مع حموووووود - الإصدار الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #030712;
            --accent: #ef4444;
            --gold: #f59e0b;
            --t1-color: #ffa500;
            --t2-color: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at center, #111827 0%, #030712 100%); }

        /* شاشة البداية */
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; animation: fadeIn 0.8s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .logo-main { font-family: 'Aref Ruqaa', serif; font-size: 80px; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.5)); margin-bottom: 40px; }

        /* الأزرار */
        .btn-luxury { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .btn-luxury:hover { background: white; color: black; box-shadow: 0 0 30px white; transform: translateY(-3px); }

        /* الخلية الذكية */
        .game-layout { display: flex; width: 100%; max-width: 1400px; justify-content: space-between; align-items: center; }
        
        .hex-grid { display: grid; grid-template-columns: repeat(5, 100px); gap: 10px; padding: 20px; perspective: 1000px; }
        .hexagon { 
            width: 100px; height: 115px; background: #1f2937; 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 40px; font-weight: 900; cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* إزاحة ذكية للأسطر لخلق شكل الخلية المعفوسة */
        .hex-grid div:nth-child(10n+6), .hex-grid div:nth-child(10n+7), .hex-grid div:nth-child(10n+8), .hex-grid div:nth-child(10n+9), .hex-grid div:nth-child(10n+10) {
            transform: translateX(55px);
        }

        .hexagon:hover { transform: scale(1.1) rotateY(10deg); filter: brightness(1.5); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .hexagon.owned-1 { background: var(--t1-color); color: white; text-shadow: 0 0 10px black; animation: pop 0.3s ease; }
        .hexagon.owned-2 { background: var(--t2-color); color: white; text-shadow: 0 0 10px black; animation: pop 0.3s ease; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* لوحات التحكم */
        .panel { width: 300px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; text-align: center; backdrop-filter: blur(20px); }
        .score { font-size: 80px; font-weight: 900; margin: 10px 0; line-height: 1; }
        .round-dots { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .dot.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .timer-circle { font-size: 60px; font-weight: 900; font-family: monospace; margin-bottom: 20px; color: #fff; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #111; padding: 40px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; }
        .modal-btns { display: flex; gap: 20px; margin-top: 30px; }
        .modal-btns button { padding: 15px 30px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 20px; transition: 0.3s; }
    </style>
</head>
<body>

    <!-- شاشة 1: البداية -->
    <section id="screen-start" class="screen active">
        <h1 class="logo-main">حروف مع حموووووود</h1>
        <div style="display: flex; gap: 20px;">
            <button class="btn-luxury" onclick="showScreen('screen-setup')">بدء اللعبة</button>
        </div>
    </section>

    <!-- شاشة 2: الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="panel" style="width: 500px;">
            <h2 style="margin-bottom: 30px;">تجهيز المواجهة</h2>
            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div style="flex:1">
                    <p>لون الفريق 1</p>
                    <input type="color" id="color-t1" value="#ffa500" style="width:100%; height:50px; border:none; background:none; cursor:pointer;">
                </div>
                <div style="flex:1">
                    <p>لون الفريق 2</p>
                    <input type="color" id="color-t2" value="#00f2ff" style="width:100%; height:50px; border:none; background:none; cursor:pointer;">
                </div>
            </div>
            <p>وقت السؤال</p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 30px;">
                <button class="btn-luxury" style="padding:10px 20px" onclick="setT(30)">30ث</button>
                <button class="btn-luxury" style="padding:10px 20px" onclick="setT(45)">45ث</button>
                <button class="btn-luxury" style="padding:10px 20px" onclick="setT(60)">60ث</button>
            </div>
            <button class="btn-luxury" style="width:100%; background: var(--gold); color: black;" onclick="startGame()">دخول الحلبة</button>
        </div>
    </section>

    <!-- شاشة 3: اللعبة -->
    <section id="screen-game" class="screen">
        <div class="game-layout">
            
            <!-- فريق 2 -->
            <div class="panel" id="panel-t2">
                <h2 id="name-t2" style="color: var(--t2-color);">الفريق الثاني</h2>
                <div class="score" id="score-2">0</div>
                <div style="margin-bottom: 20px;">
                    <button onclick="changeScore(2, 1)" style="padding:5px 15px">+</button>
                    <button onclick="changeScore(2, -1)" style="padding:5px 15px">-</button>
                </div>
                <div class="round-dots" id="rounds-2">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

            <!-- المنتصف -->
            <div style="text-align: center;">
                <div class="timer-circle" id="timer">00:45</div>
                <div style="margin-bottom: 20px;">
                    <button class="btn-luxury" style="font-size:14px; padding:10px 20px;" onclick="toggleTimer()" id="btn-timer">تشغيل</button>
                    <button class="btn-luxury" style="font-size:14px; padding:10px 20px;" onclick="resetTimer()">إعادة</button>
                </div>
                <div class="hex-grid" id="grid"></div>
                <button class="btn-luxury" style="margin-top: 25px; font-size:14px;" onclick="shuffleLetters()">تبديل الحروف عشوائياً 🔄</button>
            </div>

            <!-- فريق 1 -->
            <div class="panel" id="panel-t1">
                <h2 id="name-t1" style="color: var(--t1-color);">الفريق الأول</h2>
                <div class="score" id="score-1">0</div>
                <div style="margin-bottom: 20px;">
                    <button onclick="changeScore(1, 1)" style="padding:5px 15px">+</button>
                    <button onclick="changeScore(1, -1)" style="padding:5px 15px">-</button>
                </div>
                <div class="round-dots" id="rounds-1">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

        </div>
        <button onclick="location.reload()" style="position:fixed; bottom:20px; left:20px; color:gray; background:none; border:none; cursor:pointer;">إنهاء وإعادة كل شيء X</button>
    </section>

    <!-- Modal الاختيار -->
    <div id="modal-choice" class="modal">
        <div class="modal-content">
            <h1 id="modal-letter" style="font-size: 100px; color: var(--gold);">أ</h1>
            <h3>من الفريق الذي أجاب صح؟</h3>
            <div class="modal-btns">
                <button id="btn-win-2" onclick="assignHex(2)">الفريق الثاني</button>
                <button id="btn-win-1" onclick="assignHex(1)">الفريق الأول</button>
            </div>
            <button onclick="document.getElementById('modal-choice').style.display='none'" style="margin-top:20px; background:none; color:gray; border:none; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script>
        let config = { t1C: '#ffa500', t2C: '#00f2ff', time: 45, left: 45, running: false, s1:0, s2:0, r1:0, r2:0 };
        let currentIdx = null;
        let hexStates = Array(25).fill(null);
        let timerInt;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setT(v) { config.time = v; config.left = v; updateTimerUI(); }

        function startGame() {
            config.t1C = document.getElementById('color-t1').value;
            config.t2C = document.getElementById('color-t2').value;
            document.getElementById('name-t1').style.color = config.t1C;
            document.getElementById('name-t2').style.color = config.t2C;
            document.getElementById('btn-win-1').style.background = config.t1C;
            document.getElementById('btn-win-2').style.background = config.t2C;
            shuffleLetters();
            showScreen('screen-game');
        }

        function shuffleLetters() {
            const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split('').sort(() => Math.random() - 0.5);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            hexStates = Array(25).fill(null);
            for (let i = 0; i < 25; i++) {
                const hex = document.createElement('div');
                hex.className = 'hexagon';
                hex.id = `hex-${i}`;
                hex.innerText = letters[i];
                hex.onclick = () => openModal(i);
                grid.appendChild(hex);
            }
        }

        function openModal(idx) {
            if (hexStates[idx]) return;
            currentIdx = idx;
            document.getElementById('modal-letter').innerText = document.getElementById(`hex-${idx}`).innerText;
            document.getElementById('modal-choice').style.display = 'flex';
        }

        function assignHex(team) {
            hexStates[currentIdx] = team;
            const hex = document.getElementById(`hex-${currentIdx}`);
            hex.classList.add(`owned-${team}`);
            hex.style.background = team === 1 ? config.t1C : config.t2C;
            document.getElementById('modal-choice').style.display = 'none';
            checkWin(team);
        }

        function changeScore(team, val) {
            config[`s${team}`] += val;
            if (config[`s${team}`] < 0) config[`s${team}`] = 0;
            document.getElementById(`score-${team}`).innerText = config[`s${team}`];
        }

        // --- ذكاء التحقق من الفوز (التوصيل الذكي) ---
        function checkWin(team) {
            // خوارزمية BFS للبحث عن مسار متصل
            const size = 5;
            let startNodes = [];
            let targetNodes = [];

            if (team === 1) { // فريق 1 من الأعلى للأسفل
                for (let i = 0; i < 5; i++) if (hexStates[i] === 1) startNodes.push(i);
                for (let i = 20; i < 25; i++) if (hexStates[i] === 1) targetNodes.push(i);
            } else { // فريق 2 من اليمين لليسار
                for (let i = 0; i < 25; i += 5) if (hexStates[i] === 2) startNodes.push(i);
                for (let i = 4; i < 25; i += 5) if (hexStates[i] === 2) targetNodes.push(i);
            }

            for (let start of startNodes) {
                let visited = new Set();
                let queue = [start];
                while (queue.length > 0) {
                    let node = queue.shift();
                    if (targetNodes.includes(node)) {
                        announceRoundWin(team);
                        return;
                    }
                    if (!visited.has(node)) {
                        visited.add(node);
                        getNeighbors(node).forEach(n => {
                            if (hexStates[n] === team) queue.push(n);
                        });
                    }
                }
            }
        }

        function getNeighbors(idx) {
            const r = Math.floor(idx / 5), c = idx % 5;
            let n = [];
            const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1], [-1, 1], [1, -1]];
            dirs.forEach(([dr, dc]) => {
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < 5 && nc >= 0 && nc < 5) n.push(nr * 5 + nc);
            });
            return n;
        }

        function announceRoundWin(team) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            config[`r${team}`]++;
            const dots = document.getElementById(`rounds-${team}`).children;
            for(let i=0; i<config[`r${team}`]; i++) dots[i].classList.add('active');

            if (config[`r${team}`] >= 3) {
                setTimeout(() => alert(`🏆 مبروك للفريق ${team === 1 ? 'الأول' : 'الثاني'}! الفوز باللقب النهائي!`), 500);
            } else {
                setTimeout(() => {
                    alert(`فاز الفريق ${team} بهذه الجولة! جولة جديدة ستبدأ.`);
                    shuffleLetters();
                    resetTimer();
                }, 1000);
            }
        }

        // --- المؤقت ---
        function toggleTimer() {
            const btn = document.getElementById('btn-timer');
            if (config.running) {
                clearInterval(timerInt);
                config.running = false;
                btn.innerText = "استئناف";
            } else {
                config.running = true;
                btn.innerText = "إيقاف";
                timerInt = setInterval(() => {
                    config.left--;
                    updateTimerUI();
                    if (config.left <= 0) {
                        clearInterval(timerInt);
                        alert("انتهى الوقت!");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInt);
            config.running = false;
            config.left = config.time;
            document.getElementById('btn-timer').innerText = "تشغيل";
            updateTimerUI();
        }

        function updateTimerUI() {
            document.getElementById('timer').innerText = `00:${config.left.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
