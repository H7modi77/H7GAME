<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلية الحروف | مع المرهون - الإصدار الملكي المتوازن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #8a6d3b 0%, #d4af37 25%, #fcf6ba 50%, #d4af37 75%, #8a6d3b 100%);
            --royal-bg: #01040a;
            --t1-color: #ffa500;
            --t2-color: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; cursor: default; }
        body { background-color: var(--royal-bg); color: white; height: 100vh; overflow: hidden; }

        /* خلفية سديمية متحركة */
        .stars-bg {
            position: fixed; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #0a1931 0%, #010409 100%);
        }
        .stars-bg::after {
            content: ""; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px; animation: moveStars 150s linear infinite; opacity: 0.2;
        }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        /* العنوان الفخم */
        .brand { text-align: center; margin-bottom: 30px; }
        .main-title {
            font-family: 'Reem Kufi', sans-serif; font-size: 90px; font-weight: 900;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.5)); line-height: 1;
        }
        .sub-title { font-size: 30px; color: #fff; letter-spacing: 10px; margin-top: 10px; opacity: 0.8; }

        /* الأزرار */
        .btn-luxury {
            background: var(--glass); border: 2px solid #d4af37; color: #d4af37;
            padding: 15px 50px; font-size: 25px; font-weight: 900; border-radius: 10px;
            cursor: pointer; transition: 0.4s; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .btn-luxury:hover { background: #d4af37; color: black; box-shadow: 0 0 50px #d4af37; transform: scale(1.1); }

        /* تخطيط اللعبة الجانبي */
        .game-layout { display: flex; width: 98%; height: 90%; justify-content: space-between; align-items: center; }
        .panel {
            width: 320px; background: rgba(0,0,0,0.3); border-radius: 40px; padding: 30px;
            border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; backdrop-filter: blur(20px);
        }
        .score-num { font-size: 90px; font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        
        /* وسائل المساعدة */
        .helpers { display: grid; gap: 10px; margin-top: 20px; }
        .help-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .help-item:hover { border-color: #d4af37; background: rgba(212,175,55,0.1); }
        .help-item.used { opacity: 0.1; pointer-events: none; filter: grayscale(1); }

        /* المركز (الخلية 5x5 متوازنة) */
        .center-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .timer-box { font-size: 70px; font-weight: 900; font-family: monospace; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.4); margin-bottom: 10px; }

        /* الخلية الشبكية المتمركزة */
        .hex-grid {
            display: grid; 
            grid-template-columns: repeat(5, 100px); 
            gap: 12px;
            padding: 30px;
            /* موازنة الإزاحة لضمان التوسيط المطلق */
            margin-right: -50px; 
        }

        .hexagon {
            width: 100px; height: 115px; background: #0c121d;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; font-weight: 900; color: #fff; cursor: pointer;
            transition: 0.4s; border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        /* إزاحة الصف الثاني والرابع لخلق شكل خلية النحل */
        .hex-grid div:nth-child(10n+6), .hex-grid div:nth-child(10n+7), .hex-grid div:nth-child(10n+8), .hex-grid div:nth-child(10n+9), .hex-grid div:nth-child(10n+10) {
            transform: translateX(56px);
        }

        .hexagon:hover { transform: scale(1.2) !important; z-index: 100; filter: brightness(1.5); box-shadow: 0 0 30px #d4af37; }

        /* جولات الفوز */
        .rounds { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; background: #111; border: 2px solid #444; }
        .dot.active { background: var(--gold-gradient); box-shadow: 0 0 15px #d4af37; border-color: transparent; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-content { background: #000; padding: 50px; border-radius: 30px; border: 2px solid #d4af37; text-align: center; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <!-- شاشة البداية -->
    <section id="screen-start" class="screen active">
        <div class="brand">
            <h1 class="main-title">خلية الحروف</h1>
            <p class="sub-title">مع المرهون</p>
        </div>
        <button class="btn-luxury" onclick="showScreen('screen-setup')">بدء العرض الأسطوري</button>
    </section>

    <!-- شاشة الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="modal-content">
            <h2 style="font-size: 40px; color: #d4af37; margin-bottom: 40px;">إعدادات المنصة</h2>
            <div style="display: flex; gap: 40px; margin-bottom: 40px;">
                <div style="flex:1">فريق 1: <input type="color" id="t1-color" value="#ffa500" style="width:100%; height:50px; cursor:pointer;"></div>
                <div style="flex:1">فريق 2: <input type="color" id="t2-color" value="#00f2ff" style="width:100%; height:50px; cursor:pointer;"></div>
            </div>
            <button class="btn-luxury" style="width:100%" onclick="initGame()">دخول الاستوديو</button>
        </div>
    </section>

    <!-- شاشة اللعبة -->
    <section id="screen-game" class="screen">
        <div class="game-layout">
            
            <!-- لوحة فريق 2 (يسار) -->
            <div class="panel" style="border-right: 5px solid var(--t2-color);">
                <h2 id="name-t2" style="color:var(--t2-color); font-size:30px;">الفريق الثاني</h2>
                <div class="score-num" id="score-2">0</div>
                <div class="helpers" id="help-2">
                    <div class="help-item" onclick="useHelper(2, 1, this)">🔍 كشف الحروف للإجابة</div>
                    <div class="help-item" onclick="useHelper(2, 2, this)">⏳ إضافة 30 ثانية</div>
                    <div class="help-item" onclick="useHelper(2, 3, this)">🔄 فرصة إجابة ثانية</div>
                </div>
                <div class="rounds" id="dots-2">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

            <!-- المركز -->
            <div class="center-stage">
                <div class="timer-box" id="timer">00:45</div>
                <div style="margin-bottom:10px;">
                    <button class="btn-luxury" style="font-size:18px; padding:8px 30px;" onclick="toggleTimer()" id="timer-btn">تشغيل</button>
                    <button class="btn-luxury" style="font-size:18px; padding:8px 30px; border-color:gray; color:gray" onclick="resetTimer()">إعادة</button>
                </div>
                
                <div class="hex-grid" id="grid"></div>

                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button class="btn-luxury" style="font-size:15px; padding:10px 20px;" onclick="shuffleGrid()">تبديل الحروف 🔄</button>
                    <button class="btn-luxury" style="font-size:15px; padding:10px 20px; background:#d4af37; color:#000" onclick="openRoundWinner()">انتهت الجولة 🏁</button>
                </div>
            </div>

            <!-- لوحة فريق 1 (يمين) -->
            <div class="panel" style="border-left: 5px solid var(--t1-color);">
                <h2 id="name-t1" style="color:var(--t1-color); font-size:30px;">الفريق الأول</h2>
                <div class="score-num" id="score-1">0</div>
                <div class="helpers" id="help-1">
                    <div class="help-item" onclick="useHelper(1, 1, this)">🔍 كشف الحروف للإجابة</div>
                    <div class="help-item" onclick="useHelper(1, 2, this)">⏳ إضافة 30 ثانية</div>
                    <div class="help-item" onclick="useHelper(1, 3, this)">🔄 فرصة إجابة ثانية</div>
                </div>
                <div class="rounds" id="dots-1">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>
        </div>
        <button onclick="location.reload()" style="position:fixed; bottom:20px; left:20px; color:rgba(255,255,255,0.2); background:none; border:none; cursor:pointer;">إعادة اللعبة بالكامل 🔄</button>
    </section>

    <!-- مودال اختيار فائز الحرف -->
    <div id="modal-hex" class="modal">
        <div class="modal-content">
            <h1 id="hex-char" style="font-size:120px; background:var(--gold-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">؟</h1>
            <h3>من الفريق الفائز بهذا الحرف؟</h3>
            <div style="display:flex; gap:20px; margin-top:30px; justify-content:center;">
                <button id="win-btn-2" style="padding:15px 40px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;" onclick="setHexWinner(2)">فريق 2</button>
                <button id="win-btn-1" style="padding:15px 40px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;" onclick="setHexWinner(1)">فريق 1</button>
            </div>
            <button onclick="document.getElementById('modal-hex').style.display='none'" style="margin-top:20px; color:gray; background:none; border:none; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <!-- مودال فائز الجولة -->
    <div id="modal-round" class="modal">
        <div class="modal-content">
            <h1 style="color:#d4af37">نهاية الجولة</h1>
            <p>من الفريق الذي حسم هذه الجولة لصالحه؟</p>
            <div style="display:flex; gap:20px; margin-top:30px; justify-content:center;">
                <button class="btn-luxury" onclick="confirmRound(2)">الفريق الثاني</button>
                <button class="btn-luxury" onclick="confirmRound(1)">الفريق الأول</button>
            </div>
        </div>
    </div>

    <script>
        let config = { t1C: '#ffa500', t2C: '#00f2ff', time: 45, on: false, s1:0, s2:0, r1:0, r2:0 };
        let timerInt, curHex;
        const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split('');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initGame() {
            config.t1C = document.getElementById('t1-color').value;
            config.t2C = document.getElementById('t2-color').value;
            document.getElementById('name-t1').style.color = config.t1C;
            document.getElementById('name-t2').style.color = config.t2C;
            document.getElementById('win-btn-1').style.background = config.t1C;
            document.getElementById('win-btn-2').style.background = config.t2C;
            shuffleGrid();
            showScreen('screen-game');
        }

        function shuffleGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const shuffled = [...letters].sort(() => Math.random() - 0.5);
            shuffled.slice(0, 25).forEach(l => {
                const hex = document.createElement('div');
                hex.className = 'hexagon';
                hex.innerText = l;
                hex.onclick = () => {
                    curHex = hex;
                    document.getElementById('hex-char').innerText = l;
                    document.getElementById('modal-hex').style.display = 'flex';
                };
                grid.appendChild(hex);
            });
        }

        function setHexWinner(team) {
            const color = (team === 1) ? config.t1C : config.t2C;
            curHex.style.background = color;
            curHex.style.boxShadow = `0 0 30px ${color}`;
            curHex.style.color = "#000";
            config[`s${team}`]++;
            document.getElementById(`score-${team}`).innerText = config[`s${team}`];
            document.getElementById('modal-hex').style.display = 'none';
        }

        function openRoundWinner() { document.getElementById('modal-round').style.display = 'flex'; }

        function confirmRound(team) {
            config[`r${team}`]++;
            const dots = document.getElementById(`dots-${team}`).children;
            for(let i=0; i<config[`r${team}`]; i++) dots[i].classList.add('active');
            document.getElementById('modal-round').style.display = 'none';
            
            if(config[`r${team}`] >= 3) {
                confetti({ particleCount: 500, spread: 150, origin: { y: 0.6 } });
                setTimeout(() => { alert(`🏆 البطل التاريخي: الفريق ${team === 1 ? 'الأول' : 'الثاني'}!`); location.reload(); }, 1500);
            } else {
                alert(`فاز الفريق ${team} بالجولة! استعد للجولة التالية.`);
                shuffleGrid();
                resetTimer();
                document.querySelectorAll('.help-item').forEach(h => h.classList.remove('used'));
            }
        }

        function useHelper(team, type, btn) {
            btn.classList.add('used');
            if(type === 2) { config.time += 30; updateTimerUI(); }
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if (config.on) { clearInterval(timerInt); config.on = false; btn.innerText = "تشغيل"; }
            else {
                config.on = true; btn.innerText = "إيقاف";
                timerInt = setInterval(() => {
                    config.time--; updateTimerUI();
                    if(config.time <= 0) { clearInterval(timerInt); alert("انتهى الوقت!"); resetTimer(); }
                }, 1000);
            }
        }
        function resetTimer() { clearInterval(timerInt); config.time = 45; config.on = false; updateTimerUI(); document.getElementById('timer-btn').innerText = "تشغيل"; }
        function updateTimerUI() { document.getElementById('timer').innerText = `00:${config.time.toString().padStart(2, '0')}`; }
    </script>
</body>
</html>
