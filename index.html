<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلية الحروف | مع المرهون - الإصدار السينمائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #8a6d3b 0%, #d4af37 25%, #fcf6ba 50%, #d4af37 75%, #8a6d3b 100%);
            --royal-bg: #02040a;
            --glass: rgba(255, 255, 255, 0.02);
            --t1-color: #ffa500;
            --t2-color: #00f2ff;
            --gold-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; cursor: none; }
        
        body { background-color: var(--royal-bg); color: white; height: 100vh; overflow: hidden; }

        /* مؤشر ماوس مخصص فخم */
        #custom-cursor {
            position: fixed; width: 20px; height: 20px; border: 2px solid #d4af37;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 15px #d4af37; transition: transform 0.1s;
        }

        /* الخلفية المتحركة (الجسيمات) */
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #0a1931, #02040a); }

        .screen {
            position: absolute; width: 100%; height: 100%; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .screen.active { display: flex; animation: slideIn 1.2s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(50px) scale(0.9); filter: blur(20px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }

        /* الاسم الفخم جداً بتأثير الأنيميشن */
        .brand-container { text-align: center; margin-bottom: 30px; animation: float 4s ease-in-out infinite; }
        .main-title {
            font-family: 'Reem Kufi', sans-serif; font-size: 110px; font-weight: 900;
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.6)); line-height: 1;
        }
        .sub-title { font-size: 30px; color: #fff; letter-spacing: 15px; text-transform: uppercase; opacity: 0.8; margin-top: -10px; }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-15px) rotate(1deg); } }

        /* أزرار الاستوديو */
        .btn-luxury {
            background: var(--glass); border: 1px solid #d4af37; color: #d4af37;
            padding: 20px 60px; font-size: 28px; font-weight: 900; border-radius: 5px;
            cursor: pointer; position: relative; overflow: hidden; transition: 0.5s;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.1);
        }
        .btn-luxury::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s; }
        .btn-luxury:hover::after { left: 100%; }
        .btn-luxury:hover { background: #d4af37; color: black; box-shadow: 0 0 60px #d4af37; transform: scale(1.1); }

        /* لوحات التحكم الجانبية */
        .panel {
            width: 320px; background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px 50px 0 0; padding: 40px 20px; text-align: center;
            backdrop-filter: blur(30px); position: relative;
        }
        .score-display { font-size: 100px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin: 10px 0; }

        /* وسائل المساعدة */
        .helpers-box { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .helper-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 15px; font-size: 14px; color: #aaa; transition: 0.3s;
        }
        .helper-card:hover { border-color: #d4af37; color: #fff; background: rgba(212, 175, 55, 0.1); }
        .helper-card.used { opacity: 0.05; pointer-events: none; filter: grayscale(1); }

        /* خلية الحروف (المتحركة) */
        .hex-grid {
            display: grid; grid-template-columns: repeat(5, 95px); gap: 12px;
            padding: 20px; transition: 0.5s;
        }
        .hexagon {
            width: 95px; height: 110px; background: #0c121d;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 900; cursor: pointer; transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
            animation: pulseGrid 4s infinite alternate;
        }
        @keyframes pulseGrid { from { opacity: 0.8; } to { opacity: 1; } }

        .hex-grid.staggered div:nth-child(10n+6), .hex-grid.staggered div:nth-child(10n+7), 
        .hex-grid.staggered div:nth-child(10n+8), .hex-grid.staggered div:nth-child(10n+9), .hex-grid.staggered div:nth-child(10n+10) {
            transform: translateX(54px);
        }

        .hexagon:hover { transform: scale(1.2) rotateY(20deg) !important; z-index: 100; background: #1a2639; box-shadow: 0 0 30px #d4af37; }

        /* المؤقت */
        .timer-wrap {
            font-size: 80px; font-weight: 900; font-family: monospace; color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.4); margin-bottom: 20px;
        }

        /* النقاط (الجولات) */
        .round-box { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; background: #111; border: 2px solid #333; transition: 0.5s; }
        .dot.active { background: var(--gold); box-shadow: 0 0 20px #d4af37; border-color: transparent; }

        /* المودالات */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-content { background: #000; padding: 50px; border-radius: 30px; border: 2px solid #d4af37; text-align: center; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .footer { width: 100%; display: flex; justify-content: center; gap: 20px; padding: 30px; border-top: 1px solid rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="particles-js"></canvas>

    <!-- شاشة الافتتاحية -->
    <section id="screen-start" class="screen active">
        <div class="brand-container">
            <h1 class="main-title">خلية الحروف</h1>
            <p class="sub-title">مع المرهون</p>
        </div>
        <button class="btn-luxury" onclick="showScreen('screen-setup')">بدء العرض الأسطوري</button>
    </section>

    <!-- شاشة الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="modal-content">
            <h2 style="font-size: 40px; color: #d4af37; margin-bottom: 30px;">تجهيز المواجهة الملكية</h2>
            <div style="display:flex; gap:30px; margin-bottom:40px;">
                <div style="flex:1">فريق 1: <input type="color" id="t1-color" value="#ffa500" style="width:100%; height:60px; background:none; border:none; cursor:pointer;"></div>
                <div style="flex:1">فريق 2: <input type="color" id="t2-color" value="#00f2ff" style="width:100%; height:60px; background:none; border:none; cursor:pointer;"></div>
            </div>
            <button class="btn-luxury" style="width:100%" onclick="initGame()">دخول الاستوديو العالمي</button>
        </div>
    </section>

    <!-- شاشة اللعبة -->
    <section id="screen-game" class="screen">
        <div style="display:flex; width:100%; height:100%; justify-content:space-between; align-items:center;">
            
            <!-- فريق 2 -->
            <div class="panel" style="border-right: 4px solid var(--t2-color);">
                <h2 id="name-t2" style="color:var(--t2-color); font-size:30px;">الفريق الثاني</h2>
                <div class="score-display" id="score-2">0</div>
                <div class="helpers-box" id="helpers-2">
                    <div class="helper-card" onclick="useHelp(2, 1, this)">🔍 كشف الحروف للإجابة</div>
                    <div class="helper-card" onclick="useHelp(2, 2, this)">⏳ إضافة 30 ثانية</div>
                    <div class="helper-card" onclick="useHelp(2, 3, this)">🔄 فرصة إجابة ثانية</div>
                </div>
                <div class="round-box" id="dots-2">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

            <!-- المنتصف -->
            <div style="text-align:center; flex:1;">
                <div class="timer-wrap" id="timer">00:45</div>
                <div style="margin-bottom:15px;">
                    <button class="btn-luxury" style="padding:10px 30px; font-size:18px;" onclick="toggleTimer()" id="timer-btn">تشغيل</button>
                    <button class="btn-luxury" style="padding:10px 30px; font-size:18px; border-color:gray; color:gray" onclick="resetTimer()">إعادة</button>
                </div>
                <div class="hex-grid staggered" id="grid"></div>
            </div>

            <!-- فريق 1 -->
            <div class="panel" style="border-left: 4px solid var(--t1-color);">
                <h2 id="name-t1" style="color:var(--t1-color); font-size:30px;">الفريق الأول</h2>
                <div class="score-display" id="score-1">0</div>
                <div class="helpers-box" id="helpers-1">
                    <div class="helper-card" onclick="useHelp(1, 1, this)">🔍 كشف الحروف للإجابة</div>
                    <div class="helper-card" onclick="useHelp(1, 2, this)">⏳ إضافة 30 ثانية</div>
                    <div class="helper-card" onclick="useHelp(1, 3, this)">🔄 فرصة إجابة ثانية</div>
                </div>
                <div class="round-box" id="dots-1">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-luxury" style="font-size:16px; padding:10px 25px;" onclick="shuffleGrid()">تبديل عشوائي 🔄</button>
            <button class="btn-luxury" style="font-size:16px; padding:10px 25px; background:var(--gold); color:#000" onclick="openRoundEnd()">انتهت الجولة 🏁</button>
            <button class="btn-luxury" style="font-size:16px; padding:10px 25px; border-color:red; color:red;" onclick="location.reload()">إعادة اللعبة 🛑</button>
        </div>
    </section>

    <!-- مودال اختيار الفائز -->
    <div id="modal-hex" class="modal">
        <div class="modal-content">
            <h1 id="hex-char" style="font-size:150px; background:var(--gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">؟</h1>
            <h3>من كسب التحدي؟</h3>
            <div style="display:flex; gap:20px; margin-top:30px; justify-content:center;">
                <button id="modal-win-2" style="padding:15px 40px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;" onclick="setHexWinner(2)">فريق 2</button>
                <button id="modal-win-1" style="padding:15px 40px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;" onclick="setHexWinner(1)">فريق 1</button>
            </div>
            <button onclick="closeModal('modal-hex')" style="margin-top:20px; color:gray; background:none; border:none; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <!-- مودال نهاية الجولة -->
    <div id="modal-round" class="modal">
        <div class="modal-content">
            <h1 style="color:#d4af37">نهاية الجولة</h1>
            <p>من الفريق الفائز بهذه الجولة؟</p>
            <div style="display:flex; gap:20px; margin-top:30px; justify-content:center;">
                <button class="btn-luxury" style="font-size:20px;" onclick="confirmRound(2)">الفريق الثاني</button>
                <button class="btn-luxury" style="font-size:20px;" onclick="confirmRound(1)">الفريق الأول</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        // تعديل الماوس
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // خلفية الجسيمات المتحركة
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(212, 175, 55, 0.3)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(drawParticles);
        }
        initParticles(); drawParticles();

        // منطق اللعبة
        let config = { t1C: '#ffa500', t2C: '#00f2ff', time: 45, on: false, s1:0, s2:0, r1:0, r2:0 };
        let currentHexEl, timerInt;
        const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split('');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function initGame() {
            config.t1C = document.getElementById('t1-color').value;
            config.t2C = document.getElementById('t2-color').value;
            document.getElementById('name-t1').style.color = config.t1C;
            document.getElementById('name-t2').style.color = config.t2C;
            document.getElementById('modal-win-1').style.background = config.t1C;
            document.getElementById('modal-win-2').style.background = config.t2C;
            shuffleGrid();
            showScreen('screen-game');
        }

        function shuffleGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const shuffled = [...letters].sort(() => Math.random() - 0.5);
            shuffled.forEach(l => {
                const hex = document.createElement('div');
                hex.className = 'hexagon';
                hex.innerText = l;
                hex.onclick = () => {
                    currentHexEl = hex;
                    document.getElementById('hex-char').innerText = l;
                    document.getElementById('modal-hex').style.display = 'flex';
                };
                grid.appendChild(hex);
            });
        }

        function setHexWinner(team) {
            const color = (team === 1) ? config.t1C : config.t2C;
            currentHexEl.style.background = color;
            currentHexEl.style.boxShadow = `0 0 30px ${color}`;
            currentHexEl.style.color = "#000";
            config[`s${team}`]++;
            document.getElementById(`score-${team}`).innerText = config[`s${team}`];
            closeModal('modal-hex');
        }

        function useHelp(team, type, btn) {
            btn.classList.add('used');
            if(type === 2) { config.time += 30; updateTimerUI(); }
        }

        function openRoundEnd() { document.getElementById('modal-round').style.display = 'flex'; }

        function confirmRound(team) {
            config[`r${team}`]++;
            const dots = document.getElementById(`dots-${team}`).children;
            for(let i=0; i<config[`r${team}`]; i++) dots[i].classList.add('active');
            closeModal('modal-round');
            if(config[`r${team}`] >= 3) triggerVictory(team);
            else resetRound();
        }

        function resetRound() {
            shuffleGrid();
            resetTimer();
            document.querySelectorAll('.helper-card').forEach(c => c.classList.remove('used'));
        }

        function triggerVictory(team) {
            confetti({ particleCount: 600, spread: 100, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff'] });
            setTimeout(() => { alert(`🏆 البطل التاريخي: الفريق ${team === 1 ? 'الأول' : 'الثاني'}! 🏆`); location.reload(); }, 1500);
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if (config.on) { clearInterval(timerInt); config.on = false; btn.innerText = "تشغيل"; }
            else {
                config.on = true; btn.innerText = "إيقاف";
                timerInt = setInterval(() => {
                    config.time--; updateTimerUI();
                    if(config.time <= 0) { clearInterval(timerInt); alert("انتهى الوقت!"); resetTimer(); }
                }, 1000);
            }
        }
        function resetTimer() { clearInterval(timerInt); config.time = 45; config.on = false; updateTimerUI(); document.getElementById('timer-btn').innerText = "تشغيل"; }
        function updateTimerUI() { document.getElementById('timer').innerText = `00:${config.time.toString().padStart(2, '0')}`; }
    </script>
</body>
</html>
